<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />

    <!-- CRITICAL FOR VERCEL/SPA: Prevents 404 on refresh -->
    <base href="/" />

    <!-- iOS Meta Tags & Icons -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Memory Agent" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Main Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Viewport & Responsiveness -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="theme-color"
      content="#000000"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />

    <title>Memory Agent - Multimodal AI</title>

    <!-- Security: Content Security Policy (Adjust 'self' if loading external fonts/images) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; 
                 script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; 
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
                 font-src 'self' https://fonts.gstatic.com; 
                 img-src 'self' data: blob: https:; 
                 connect-src 'self' https: wss:;"
    />

    <style>
      /* Professional Loading Overlay */
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #000000; /* Default to Dark Mode base */
        overflow: hidden; /* Prevent scroll during load */
      }

      #loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        color: #ffffff;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      .loader-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        /* Placeholder for logo animation */
        background: linear-gradient(135deg, #6200ea 0%, #00bcd4 100%);
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(98, 0, 234, 0.4);
        animation: pulse 2s infinite;
      }

      .loader-text {
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: 1px;
        opacity: 0.8;
      }

      .loader-subtext {
        font-size: 0.85rem;
        color: #888;
        margin-top: 8px;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          box-shadow: 0 0 20px rgba(98, 0, 234, 0.4);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 0 35px rgba(98, 0, 234, 0.6);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 20px rgba(98, 0, 234, 0.4);
        }
      }

      /* Hide loading screen when Flutter is ready */
      body.flutter-ready #loading-container {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Loading Overlay -->
    <div id="loading-container">
      <div class="loader-logo"></div>
      <div class="loader-text">MEMORY AGENT</div>
      <div class="loader-subtext">Initializing Neural Engine...</div>
    </div>

    <!-- Flutter Entry Point -->
    <script src="main.dart.js" type="application/javascript"></script>

    <!-- Service Worker Registration for PWA -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("flutter_service_worker.js");
        });
      }

      // Remove loading screen when Flutter renders
      window.addEventListener("flutter-first-frame", function () {
        document.body.classList.add("flutter-ready");
        setTimeout(() => {
          const loader = document.getElementById("loading-container");
          if (loader) loader.remove();
        }, 500);
      });
    </script>
  </body>
</html>
