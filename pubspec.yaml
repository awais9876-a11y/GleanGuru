name: multimodal_memory_agent
description: A production-ready mobile application with local-first Multimodal Memory Agent
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^12.1.1
  auto_route: ^7.8.4
  
  # Authentication & Security
  firebase_auth: ^4.16.0
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^5.0.0
  flutter_facebook_auth: ^6.0.4
  local_auth: ^2.1.7
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  pointycastle: ^3.7.4
  jwt_decoder: ^2.0.1
  
  # Database & Storage
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+2
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  
  # Network & API
  dio: ^5.4.0
  retrofit: ^4.0.3
  graphql_flutter: ^5.1.2
  connectivity_plus: ^5.0.2
  
  # Push Notifications
  firebase_messaging: ^14.7.9
  firebase_core: ^2.24.0
  
  # Camera & Media
  image_picker: ^1.0.5
  image_cropper: ^5.0.1
  cached_network_image: ^3.3.1
  
  # Billing & Monetization
  in_app_purchase: ^3.1.11
  google_mobile_ads: ^4.0.0
  
  # Telemetry & Error Tracking
  sentry_flutter: ^7.11.0
  firebase_crashlytics: ^3.4.8
  
  # Utilities
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  uuid: ^4.2.2
  intl: ^0.18.1
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  dartz: ^0.10.1
  get_it: ^7.6.4
  injectable: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  retrofit_generator: ^8.0.4
  injectable_generator: ^2.4.1
  bloc_test: ^9.1.5
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/config/
    
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
