name: multimodal_memory_agent
description: A simple memory agent chat app with Qwen (Dashscope) AI integration.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  # Local, on-device persistence for the chat history / "knowledge bank".
  # Works out of the box on Flutter Web (backed by browser localStorage)
  # and on every other platform (backed by native prefs) - no server-side
  # database needed for the current, simplified scope of this app.
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
