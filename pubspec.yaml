name: multimodal_memory_agent
description: A multimodal memory agent with Qwen AI integration.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  get_it: ^7.6.7
  go_router: ^12.1.1
  shared_preferences: ^2.2.2
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.10
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^5.0.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.0.0
  jwt_decoder: ^2.0.1
  encrypt: ^5.0.3 # For AES-GCM
  path_provider: ^2.1.1
  path: ^1.9.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0 # For web/desktop support simulation if needed

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  bloc_test: ^9.1.5
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
