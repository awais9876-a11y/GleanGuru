# Reference config for deployments that host build/web as *pure static*
# content (e.g. Alibaba Cloud OSS + CDN, or a separate Nginx/CDN layer in
# front of another backend for /api/*). If you use this standalone, you must
# provide /api/chat some other way (e.g. proxy_pass to a separate service)
# or the chat feature will not work.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
