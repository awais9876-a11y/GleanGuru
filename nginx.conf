# NOTE: The provided Dockerfile now serves the app via server.js (Node)
# instead of Nginx, because server.js also implements POST /api/chat
# (needed for the in-app chat feature). This nginx.conf is kept as a
# reference for deployments that host the built `build/web` folder as
# *pure static* content (e.g. Alibaba Cloud OSS + CDN, or a separate
# Nginx/CDN layer in front of another backend for /api/*). If you use
# this config standalone, you must provide /api/chat some other way
# (e.g. proxy_pass to a separate Node/Function Compute service) or the
# in-app chat feature will not work.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle SPA Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
