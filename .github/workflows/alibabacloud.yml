name: Deploy Flutter Web to Alibaba Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Flutter Web App
        run: flutter build web --release --source-maps --base-href "/"

      # region and bucket come from GitHub Secrets - set these in:
      # repo -> Settings -> Secrets and variables -> Actions:
      #   ALIBABA_ACCESS_KEY_ID
      #   ALIBABA_ACCESS_KEY_SECRET
      #   ALIBABA_OSS_REGION   (e.g. oss-us-west-1, oss-cn-hangzhou)
      #   ALIBABA_OSS_BUCKET   (your bucket name, no oss:// prefix)
      - name: Setup Alibaba Cloud CLI
        uses: aliyun/aliyun-cli-action@v1
        with:
          mode: AK
          access-key-id: ${{ secrets.ALIBABA_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIBABA_ACCESS_KEY_SECRET }}
          region: ${{ secrets.ALIBABA_OSS_REGION }}

      - name: Configure OSS static website hosting (SPA fallback)
        run: |
          aliyun oss website --method put oss://${{ secrets.ALIBABA_OSS_BUCKET }} oss-website-config.xml

      - name: Sync Files to Alibaba OSS
        run: |
          aliyun oss sync ./build/web/ oss://${{ secrets.ALIBABA_OSS_BUCKET }}/ --delete --region ${{ secrets.ALIBABA_OSS_REGION }}

      # NOTE: pure static deploy only - /api/chat will NOT work through OSS.
      # Use the Dockerfile (ECS/ACK/SAE) if you need chat working on Alibaba.
