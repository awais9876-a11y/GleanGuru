name: Deploy Flutter Web to Alibaba Cloud

# This tells GitHub to run this script automatically every time someone pushes code to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # Spins up a clean Linux machine in the cloud

    steps:
      # Step 4.1: Download your source code onto the runner machine
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 4.2: Install Java (Required for baseline mobile/web building tasks)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Step 4.3: Download and install the specific Flutter environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Uses the stable release channel
          architecture: x64

      # Step 4.4: Fetch external packages listed in your pubspec.yaml file
      - name: Install Dependencies
        run: flutter pub get

      # Step 4.5: Compile the app into production-ready Web assets (HTML, JS, CSS)
      - name: Build Flutter Web App
        run: flutter build web --release

      # Step 4.6: Securely set up the Alibaba Cloud CLI workspace tool
      - name: Setup Alibaba Cloud CLI
        uses: aliyun/aliyun-cli-action@v1
        with:
          mode: AK
          access-key-id: ${{ secrets.ALIBABA_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIBABA_ACCESS_KEY_SECRET }}
          region: 'us-west-1' # CHANGE THIS to match your exact Alibaba Bucket region code!

      # Step 4.7: Push files to the OSS bucket and wipe away deprecated old files
      - name: Sync Files to Alibaba OSS
        run: |
          aliyun oss sync ./build/web/ oss://my-flutter-app-space/ --delete
