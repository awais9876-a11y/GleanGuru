name: Build and Deploy to Vercel

on:
  push:
    branches:
      - main # Or your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0" # Use the version your project requires
          channel: "stable"
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web Release
        # CRITICAL: Build with 'html' renderer for best compatibility and smaller size
        run: flutter build web --release --web-renderer html --base-href="/"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./build/web
          # If this is the first deploy, it creates a preview.
          # To force production, we add --prod flag via vercel-cli logic or handle via dashboard
          vercel-args: "--prod"
          # Note: For the very first deploy, you might need to link manually in Vercel Dashboard
          # then re-run this action.
